<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<title>Galaga</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; touch-action: none;
  user-select: none; -webkit-user-select: none;
  position: fixed; top: 0; left: 0;
  font-family: monospace;
}
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC({ latencyHint: 'interactive' });
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  } catch(e) {}
}

function playSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g).connect(audioCtx.destination);
  g.gain.setValueAtTime(0.0001, t);
  switch(type) {
    case 'shoot':
      osc.type='square'; osc.frequency.setValueAtTime(880,t);
      osc.frequency.exponentialRampToValueAtTime(440,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.12,t+0.005);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      osc.start(t); osc.stop(t+0.07); break;
    case 'explode':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(40,t+0.22);
      g.gain.exponentialRampToValueAtTime(0.16,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      osc.start(t); osc.stop(t+0.23); break;
    case 'bigExplode':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(150,t);
      osc.frequency.exponentialRampToValueAtTime(30,t+0.35);
      g.gain.exponentialRampToValueAtTime(0.19,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.36); break;
    case 'gameover':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(440,t);
      osc.frequency.exponentialRampToValueAtTime(55,t+0.7);
      g.gain.exponentialRampToValueAtTime(0.11,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      osc.start(t); osc.stop(t+0.72); break;
    case 'powerup':
      osc.type='sine'; osc.frequency.setValueAtTime(440,t);
      osc.frequency.setValueAtTime(660,t+0.05);
      osc.frequency.setValueAtTime(880,t+0.1);
      g.gain.exponentialRampToValueAtTime(0.15,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      osc.start(t); osc.stop(t+0.26); break;
    case 'dive':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(600,t);
      osc.frequency.exponentialRampToValueAtTime(100,t+0.3);
      g.gain.exponentialRampToValueAtTime(0.08,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.32); break;
    case 'wave':
      osc.type='sine'; osc.frequency.setValueAtTime(300,t);
      osc.frequency.exponentialRampToValueAtTime(900,t+0.4);
      g.gain.exponentialRampToValueAtTime(0.1,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.42); break;
    case 'waveClear':
      osc.type='sine';
      osc.frequency.setValueAtTime(440,t);
      osc.frequency.setValueAtTime(554,t+0.08);
      osc.frequency.setValueAtTime(659,t+0.16);
      osc.frequency.setValueAtTime(880,t+0.24);
      g.gain.exponentialRampToValueAtTime(0.14,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      osc.start(t); osc.stop(t+0.46); break;
    case 'bossWarn':
      osc.type='square'; osc.frequency.setValueAtTime(800,t);
      osc.frequency.setValueAtTime(600,t+0.1);
      osc.frequency.setValueAtTime(800,t+0.2);
      osc.frequency.setValueAtTime(600,t+0.3);
      g.gain.exponentialRampToValueAtTime(0.08,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.36); break;
    case 'tractorBeam':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(80,t);
      osc.frequency.linearRampToValueAtTime(120,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.06,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.51); break;
    case 'beamBreak':
      osc.type='square'; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(800,t+0.1);
      g.gain.exponentialRampToValueAtTime(0.1,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      osc.start(t); osc.stop(t+0.13); break;
    case 'dualLost':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(600,t);
      osc.frequency.exponentialRampToValueAtTime(100,t+0.3);
      g.gain.exponentialRampToValueAtTime(0.1,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.31); break;
    case 'superExplosion':
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(100,t);
      osc.frequency.setValueAtTime(200,t+0.05);
      osc.frequency.exponentialRampToValueAtTime(20,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.2,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.52); break;
  }
}

// ===== MUSIC =====
let musicGain = null;
let musicEnabled = false;
let musicInterval = null;
let melodyIdx = 0, bassIdx = 0;

const MELODY = [
  523,587,659,784, 659,587,523,440,
  494,523,587,659, 784,880,784,659,
  587,523,440,392, 440,494,523,587,
  659,784,880,1047, 880,784,659,523
];
const BASS = [
  131,131,147,147, 165,165,175,175,
  131,131,147,147, 165,165,147,131,
  131,131,147,147, 165,165,175,175,
  196,196,175,165, 147,147,131,131
];
const NOTE_DUR = 0.15;

function playMusicNote(freq, dur, type, vol) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.95);
  osc.connect(g);
  if (musicGain) g.connect(musicGain); else g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}

function playKick() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.08);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(g); g.connect(musicGain);
  osc.start(t); osc.stop(t + 0.12);
}

function playHihat() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 8000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  src.connect(hp); hp.connect(g); g.connect(musicGain);
  src.start(t); src.stop(t + 0.05);
}

function startMusic() {
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.05;
  musicGain.connect(audioCtx.destination);
  musicEnabled = true;
  melodyIdx = 0; bassIdx = 0;

  function loop() {
    if (!musicEnabled || state !== STATE.PLAYING) return;
    playKick();
    playKick();
    playHihat();
    playHihat();
    const n = MELODY[melodyIdx]; melodyIdx = (melodyIdx + 1) % MELODY.length;
    playMusicNote(n, NOTE_DUR, 'square', 0.035);
    const b = BASS[bassIdx]; bassIdx = (bassIdx + 1) % BASS.length;
    playMusicNote(b, NOTE_DUR, 'sawtooth', 0.025);
  }
  loop();
  musicInterval = setInterval(loop, 300);
}

function stopMusic() {
  musicEnabled = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function toggleMusic() {
  musicEnabled = !musicEnabled;
  if (musicEnabled) { if (state === STATE.PLAYING) startMusic(); }
  else stopMusic();
}

// ===== CANVAS =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
const dprMax = 2;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, dprMax);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resize(); updateBtns(); });
resize();

// ===== GAME STATE =====
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, WAVE_TRANS: 3 };
let state = STATE.MENU;
let score = 0, highScore = parseInt(localStorage.getItem('galaga_hs') || '0');
let lives = 3, wave = 0, combo = 0, comboTimer = 0;
let waveTimer = 0;
let shakeTimer = 0, shakeIntensity = 0;
let flashTimer = 0;
let frameNum = 0;
let gameTime = 0;
let waveClearTimer = 0, waveClearMsg = '';

// Attack wave system (Galaga-style coordinated dives after ~20s)
let attackWaveActive = false;
let nextAttackTime = 0;
let attackWaveCount = 0;

// Tractor beam state
let tractorBeam = null;
let tractorBeamTimer = 0;
let tractorBeamAlpha = 0;

// Stars
let starCount = (W > 600) ? 80 : 60;
let stars = [];
for (let i = 0; i < starCount; i++) stars.push({
  x: Math.random() * W, y: Math.random() * H,
  speed: 0.15 + Math.random() * 0.4, size: 0.4 + Math.random() * 0.8,
  alpha: 0.2 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2
});

let particles = [];
let enemyBullets = [];
let powerups = [];
let scorePopups = [];
let formParticles = [];
let formationX = 0, formationDir = 1;

// ===== PLAYER =====
let player = {
  x: 200, y: 0, w: 28, h: 28,
  vx: 0, targetVx: 0,
  bullets: [], fireRate: 35, fireCD: 0,
  inv: 0, dual: false, thrust: 0,
  caught: false, caughtTimer: 0
};

// ===== ENEMIES =====
let enemies = [];
const ET = {
  bee:    { c: '#ffff00', a: '#ffaa00', hp: 1, sc: 100, w: 22, h: 20 },
  butter: { c: '#ff00ff', a: '#ff66ff', hp: 1, sc: 200, w: 26, h: 22 },
  boss:   { c: '#ff2222', a: '#ff8888', hp: 2, sc: 400, w: 38, h: 32 },
  boss2:  { c: '#00ccff', a: '#88eeff', hp: 3, sc: 600, w: 42, h: 36 }
};

// Dive attack patterns (Galaga-style)
function startAttackDive(e, pattern) {
  e.st = 'dive';
  e.divePhase = 0;
  e.diveTimer = 0;
  e.scnt = 0;
  e.attackPattern = pattern;
  e.diveApproachX = player.x + (Math.random() - 0.5) * 100;
  e.diveReturnX = e.hx;
  e.diveReturnY = e.hy;
  e.attackFireRate = 0.025 + wave * 0.003; // more aggressive fire
  playSound('dive');
}

function mkForm() {
  enemies = [];
  const cols = 8, rows = 5;
  const sp = Math.min(50, W / (cols + 2));
  const sx = W / 2 - (cols * sp) / 2 + sp / 2;
  const types = ['bee', 'butter', 'bee', 'butter', 'boss'];
  let championIdx = -1;
  if (wave % 2 === 1 && wave > 0) {
    championIdx = 4 * cols;
  } else if (Math.random() < 0.5) {
    championIdx = 4 * cols + Math.floor(Math.random() * cols);
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const t = types[r % 5];
      const d = ET[t];
      const isChampion = (r === 4 && c === 0) || (championIdx === r * cols + c);
      enemies.push({
        x: sx + c * sp, y: 95 + r * sp,
        hx: sx + c * sp, hy: 95 + r * sp,
        w: d.w, h: d.h, hp: d.hp, mhp: d.hp,
        sc: d.sc, type: t, st: 'form',
        ph: Math.random() * Math.PI * 2,
        on: true, al: true,
        sht: 80 + Math.random() * 120,
        dt: (t === 'boss' || t === 'boss2') ? 120 + Math.random() * 180 : -1,
        dp: 0, da: 0, scnt: 0, ft: 0,
        divePhase: 0, diveTimer: 0,
        diveApproachX: 0, diveReturnX: 0, diveReturnY: 0,
        champion: isChampion,
        deathAnim: 0, spawnDelay: 0, spawnAnim: 0,
        attackPattern: 'normal', attackFireRate: 0.015
      });
    }
  }
  powerups = []; scorePopups = []; formParticles = [];
  tractorBeam = null;
  tractorBeamTimer = 0; tractorBeamAlpha = 0;
  player.caught = false; player.caughtTimer = 0;
  attackWaveActive = false;
  nextAttackTime = 0;
  attackWaveCount = 0;
}

function eVis(e) { return e.st === 'form' ? e.x + formationX : e.x; }

// ===== INPUT =====
let keys = {};
let touchLeft = false, touchRight = false, touchFire = false;
let lastTouchX = 0, lastTouchY = 0, touchMoving = false;
let leftBtnX = 0, leftBtnY = 0, leftBtnR = 35;
let rightBtnX = 0, rightBtnY = 0, rightBtnR = 35;
let fireBtnX = 0, fireBtnY = 0, fireBtnR = 55;

function updateBtns() {
  const safeBottom = 30;
  const bottomY = H - safeBottom;
  leftBtnX = W * 0.12; leftBtnY = bottomY;
  rightBtnX = W * 0.32; rightBtnY = bottomY;
  fireBtnX = W - 70; fireBtnY = bottomY;
  const br = Math.min(55, W * 0.11);
  leftBtnR = rightBtnR = br;
  fireBtnR = br * 1.3;
}
updateBtns();

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault(); initAudio();
  const x = e.clientX, y = e.clientY;
  if (state === STATE.MENU) { start(); return; }
  if (state === STATE.GAMEOVER) { state = STATE.MENU; return; }
  const dx = x - fireBtnX, dy = y - fireBtnY;
  if (Math.hypot(dx, dy) < fireBtnR * 1.3) { touchFire = true; fire(); return; }
  const dL = x - leftBtnX, dyL = y - leftBtnY;
  if (Math.hypot(dL, dyL) < leftBtnR * 1.3) { touchLeft = true; return; }
  const dR = x - rightBtnX, dyR = y - rightBtnY;
  if (Math.hypot(dR, dyR) < rightBtnR * 1.3) { touchRight = true; return; }
  if (x < W * 0.45) { touchMoving = true; lastTouchX = x; lastTouchY = y; }
});

canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if (touchMoving) {
    const dx = e.clientX - lastTouchX;
    player.targetVx += dx * 0.15;
    lastTouchX = e.clientX;
    lastTouchY = e.clientY;
  }
});

canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  touchMoving = false; touchLeft = false; touchRight = false; touchFire = false;
});

canvas.addEventListener('pointercancel', (e) => {
  e.preventDefault();
  touchMoving = false; touchLeft = false; touchRight = false; touchFire = false;
});

document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

document.addEventListener('keydown', (e) => {
  keys[e.key] = true; initAudio();
  if (state === STATE.MENU) { start(); return; }
  if (state === STATE.GAMEOVER) { state = STATE.MENU; return; }
  if (e.key === ' ' || e.key === 'j' || e.key === 'J') {
    e.preventDefault();
    if (player.fireCD <= 0) fire();
  }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function fire() {
  if (player.fireCD > 0) return;
  player.fireCD = player.fireRate;
  playSound('shoot');
  if (player.dual) {
    player.bullets.push({ x: player.x - 5, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
    player.bullets.push({ x: player.x + 5, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
  } else {
    player.bullets.push({ x: player.x, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
  }
}

function start() {
  state = STATE.PLAYING;
  score = 0; lives = 3; wave = 0; combo = 0; comboTimer = 0;
  player.x = W / 2; player.y = H - 85;
  player.bullets = []; player.fireCD = 0; player.inv = 150; player.dual = false;
  player.vx = 0; player.targetVx = 0; player.thrust = 0;
  player.caught = false; player.caughtTimer = 0;
  enemyBullets = []; particles = []; powerups = []; scorePopups = [];
  formParticles = [];
  shakeTimer = 0; flashTimer = 0; frameNum = 0; gameTime = 0;
  waveClearTimer = 0; waveClearMsg = '';
  tractorBeam = null; tractorBeamTimer = 0; tractorBeamAlpha = 0;
  attackWaveActive = false; nextAttackTime = 0; attackWaveCount = 0;
  mkForm();
  startMusic();
}

// ===== UPDATE =====
function update() {
  frameNum++;

  if (state === STATE.MENU) {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } }
    return;
  }
  if (state === STATE.GAMEOVER) {
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].life--; particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;
    return;
  }
  if (state === STATE.WAVE_TRANS) {
    waveTimer--;
    if (waveTimer <= 0) { state = STATE.PLAYING; mkForm(); playSound('wave'); }
    return;
  }

  // === PLAYING ===
  player.inv = Math.max(0, player.inv - 1);
  player.fireCD = Math.max(0, player.fireCD - 1);
  if (comboTimer > 0) { comboTimer--; } else { combo = 0; }
  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;
  if (waveClearTimer > 0) waveClearTimer--;
  gameTime++;

  // --- ATTACK WAVE SYSTEM ---
  // After ~20 seconds (1200 frames at 60fps), start coordinated attack waves
  if (gameTime > 1200 && !attackWaveActive) {
    attackWaveActive = true;
    nextAttackTime = 300 + Math.random() * 200; // 5-8 seconds until next wave
  }

  if (attackWaveActive && nextAttackTime <= 0) {
    const waveSize = 2 + Math.floor(Math.random() * 3);
    const patterns = ['zigzag', 'spiral', 'diagonal', 'swarm'];
    const pattern = patterns[Math.floor(Math.random() * patterns.length)];
    const formEnemies = enemies.filter(e => e.on && e.al && e.st === 'form' && e.dt <= 0);
    const toDive = formEnemies.slice(0, waveSize);
    for (const e of toDive) {
      if (e.st === 'form' && e.dt <= 0) startAttackDive(e, pattern);
    }
    attackWaveCount++;
    nextAttackTime = 300 + Math.random() * 200;
    shakeTimer = 6; shakeIntensity = 4;
  }
  if (nextAttackTime > 0) nextAttackTime--;

  // Tractor beam
  if (tractorBeam) {
    tractorBeam.timer--;
    tractorBeamAlpha = Math.min(1, tractorBeamAlpha + 0.08);
    if (tractorBeam.timer <= 0) {
      tractorBeamAlpha = 0; playSound('beamBreak'); tractorBeam = null;
    }
    if (tractorBeamAlpha > 0.5 && !player.caught) {
      const bx = tractorBeam.x, by = tractorBeam.y;
      if (Math.hypot(bx - player.x, by - player.y) < 22) { player.caught = true; player.caughtTimer = 0; }
    }
    if (player.caught) {
      player.caughtTimer++;
      const bx = tractorBeam.x, by = tractorBeam.y;
      const dx = bx - player.x, dy = by - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 5) { player.x += (dx / dist) * 0.35; player.y += (dy / dist) * 0.35; }
      if (player.caughtTimer > 150) {
        if (player.dual) { player.dual = false; playSound('dualLost'); spawnP(player.x, player.y, '#ff00ff', 8); shakeTimer = 8; shakeIntensity = 5; }
        player.caught = false; player.caughtTimer = 0;
        tractorBeamAlpha = 0; tractorBeam = null;
      }
    }
  }

  // Touch / keyboard movement
  if (touchLeft) player.targetVx -= 0.4;
  if (touchRight) player.targetVx += 0.4;
  if (touchFire && player.fireCD <= 0) fire();
  if (keys['ArrowLeft'] || keys['a']) player.targetVx -= 0.4;
  if (keys['ArrowRight'] || keys['d']) player.targetVx += 0.4;

  // Physics
  const friction = 0.88;
  player.targetVx *= friction;
  player.targetVx = Math.max(-6, Math.min(6, player.targetVx));
  player.vx += (player.targetVx - player.vx) * 0.25;
  player.x += player.vx;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = H - 85;
  player.thrust = Math.abs(player.vx) / 5;

  // Player bullets
  for (let i = player.bullets.length - 1; i >= 0; i--) {
    const b = player.bullets[i];
    b.y += b.vy;
    if (b.y < -25) player.bullets.splice(i, 1);
  }

  // Formation drift - Galaga style: reverses at edges with slight bounce
  const driftSpeed = 0.25 + wave * 0.03;
  formationX += formationDir * driftSpeed;
  const edgeMargin = W * 0.15;
  if (formationX > edgeMargin) { formationDir = -1; shakeTimer = 3; }
  else if (formationX < -edgeMargin) { formationDir = 1; shakeTimer = 3; }

  // Tractor beam trigger
  tractorBeamTimer--;
  const champions = enemies.filter(e => e.on && e.al && e.champion && e.st === 'form');
  if (champions.length > 0 && tractorBeam === null && tractorBeamTimer <= 0) {
    const champ = champions[Math.floor(Math.random() * champions.length)];
    if (champ.dt <= 0) {
      const angle = Math.atan2(player.y - champ.y, player.x - champ.x);
      const beamDist = 250 + Math.random() * 100;
      tractorBeam = { x: champ.x + Math.cos(angle) * beamDist, y: champ.y + Math.sin(angle) * beamDist, angle, timer: 80 };
      tractorBeamTimer = 250 + Math.random() * 200;
      playSound('bossWarn');
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.on || !e.al) continue;
    e.ft = Math.max(0, e.ft - 1);

    if (e.deathAnim > 0) { e.deathAnim--; continue; }

    if (e.st === 'form') {
      e.y = e.hy + Math.sin(Date.now() * 0.0015 + e.ph) * 2;
      if (e.dt > 0 && !(e.champion && tractorBeam !== null)) {
        e.dt--;
        if (e.dt <= 0) {
          // Normal dive (not in attack wave)
          e.st = 'dive'; e.divePhase = 0; e.diveTimer = 0; e.scnt = 0;
          e.diveApproachX = player.x + (Math.random() - 0.5) * 60;
          e.diveReturnX = e.hx; e.diveReturnY = e.hy;
          e.attackPattern = 'normal'; e.attackFireRate = 0.015;
          playSound('dive');
        }
      }
      if (e.sht <= 0 && e.scnt < 1 && Math.random() < 0.0015) {
        e.sht = 100; e.scnt++;
        shootAimed(e, eVis(e));
      }
    }

    if (e.st === 'dive') {
      e.diveTimer++;
      const dx = player.x - e.x, dy = player.y - e.y;

      if (e.divePhase === 0) {
        e.x += (e.diveApproachX - e.x) * 0.04;
        e.y += 0.8;
        if (e.attackPattern === 'zigzag') e.x += Math.sin(e.diveTimer * 0.1) * 1.5;
        else if (e.attackPattern === 'spiral') e.x += Math.cos(e.diveTimer * 0.08) * 1.2;
        else if (e.attackPattern === 'diagonal') e.x += (dx > 0 ? 0.3 : -0.3);
        if (e.diveTimer > 40 || Math.abs(e.x - e.diveApproachX) < 15) { e.divePhase = 1; e.diveTimer = 0; }
      } else if (e.divePhase === 1) {
        const diveAngle = Math.atan2(dy, dx);
        e.x += Math.cos(diveAngle) * 1.4;
        e.y += Math.sin(diveAngle) * 1.4;
        if (e.attackPattern === 'u-turn') e.x += (e.diveTimer % 60 < 30 ? (dx > 0 ? 0.5 : -0.5) : (dx > 0 ? -0.5 : 0.5));
        else if (e.attackPattern === 'swarm') { e.x += (dx > 0 ? 0.3 : -0.3); e.y += (dy > 0 ? 0.2 : -0.2); }
        if (e.y > player.y + 30 || e.y > H + 15) { e.divePhase = 2; e.diveTimer = 0; }
      } else if (e.divePhase === 2) {
        e.x += (e.diveReturnX - e.x) * 0.03;
        e.y += (e.diveReturnY - e.y) * 0.03;
        if (Math.abs(e.y - e.diveReturnY) < 8 && Math.abs(e.x - e.diveReturnX) < 8) {
          e.st = 'form'; e.divePhase = 0; e.diveTimer = 0; e.dt = 120 + Math.random() * 180;
          e.attackPattern = 'normal';
        }
      }

      // Shooting: more aggressive during attack waves
      if (e.scnt < 1 && Math.random() < (e.attackPattern !== 'normal' ? e.attackFireRate : 0.015)) {
        e.scnt++; shootAimed(e, e.x);
      }
    }

    if (e.st === 'retreat') {
      e.x += Math.cos(e.da) * 1.5; e.y += Math.sin(e.da) * 1.5;
      if (e.y < -40) { e.st = 'form'; e.x = e.hx; e.y = e.hy; e.divePhase = 0; e.attackPattern = 'normal'; }
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    const spd = Math.hypot(b.vx, b.vy);
    if (spd > 3.5) { b.vx = (b.vx / spd) * 3.5; b.vy = (b.vy / spd) * 3.5; }
    if (b.y > H + 20 || b.x < -20 || b.x > W + 20) { enemyBullets.splice(i, 1); continue; }
    if (player.inv <= 0 && !player.caught) {
      if (b.x > player.x - 16 && b.x < player.x + 16 && b.y > player.y - 14 && b.y < player.y + 14) {
        enemyBullets.splice(i, 1); hitPlayer();
      }
    }
  }

  // Player bullets vs enemies
  for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
    const b = player.bullets[bi];
    for (const e of enemies) {
      if (!e.on || !e.al || e.deathAnim > 0) continue;
      const ex = eVis(e);
      if (b.x > ex - 14 && b.x < ex + 14 && b.y > e.y - 12 && b.y < e.y + 12) {
        player.bullets.splice(bi, 1);
        e.hp--; e.ft = 5;
        if (e.hp <= 0) {
          e.deathAnim = 18;
          const pts = e.sc * (1 + Math.floor(combo / 3));
          score += pts; combo++; comboTimer = 100;
          scorePopups.push({ x: ex, y: e.y, text: '+' + pts.toString(), life: 50, c: '#ffff00' });
          shakeTimer = 4; shakeIntensity = 3;
        } else spawnP(b.x, b.y, '#ffffff', 2);
        break;
      }
    }
  }

  // Spawn explosions after death anim
  for (const e of enemies) {
    if (e.deathAnim === 1 && e.on && e.al) {
      const ex = eVis(e); e.on = false; e.al = false;
      playSound('explode'); spawnP(ex, e.y, e.c, 10); spawnP(ex, e.y, '#fff', 4);
      if (e.type === 'boss' || e.type === 'boss2') {
        shakeTimer = 6; shakeIntensity = 5; spawnP(ex, e.y, '#fff', 6);
        if (e.type === 'boss2') { shakeTimer = 8; shakeIntensity = 7; }
      }
      if ((e.type === 'boss' || e.type === 'boss2') && Math.random() < 0.35) {
        powerups.push({ x: ex, y: e.y, vy: 1, t: 'dual', life: 350, w: 20, h: 10 });
      }
      if (enemies.filter(en => en.on && en.al).length === 0) {
        for (let ii = 0; ii < 3; ii++) spawnP(ex + (Math.random() - 0.5) * 100, e.y + (Math.random() - 0.5) * 40, ['#ff0', '#f0f', '#0ff'][ii], 5);
      }
    }
  }

  // Enemy collision
  for (const e of enemies) {
    if (!e.on || !e.al || e.deathAnim > 0 || player.inv > 0) continue;
    const ex = eVis(e);
    if (Math.hypot(ex - player.x, e.y - player.y) < Math.max(e.w, e.h) / 2 + player.w / 2 - 3) {
      e.on = false; e.al = false; lives--; hitPlayer();
    }
  }

  // Wave clear - continues indefinitely (no cap!)
  const alive = enemies.filter(e => e.on && e.al).length;
  if (alive === 0 && enemies.length > 0) {
    wave++;
    // REMOVED: if (wave>25) wave=25; -- waves go on forever
    state = STATE.WAVE_TRANS;
    waveTimer = 100;
    waveClearTimer = 90;
    waveClearMsg = 'WAVE ' + wave + ' CLEAR';
    playSound('waveClear');
    for (let i = 0; i < 5; i++) {
      const bx = Math.random() * W, by = H * 0.3 + Math.random() * H * 0.3;
      const cols = ['#ff0', '#f0f', '#0ff', '#f80', '#fff'];
      spawnP(bx, by, cols[Math.floor(Math.random() * cols.length)], 8);
    }
    shakeTimer = 10; shakeIntensity = 10; flashTimer = 5;
  }

  // Powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy; p.life--;
    if (p.life <= 0 || p.y > H + 20) { powerups.splice(i, 1); continue; }
    if (Math.abs(p.x - player.x) < 22 && Math.abs(p.y - player.y) < 22) {
      player.dual = true; playSound('powerup'); spawnP(p.x, p.y, '#ffcc00', 8); powerups.splice(i, 1);
    }
  }

  // Score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life--; scorePopups[i].y -= 0.4;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  // Form particles
  for (let i = formParticles.length - 1; i >= 0; i--) {
    const fp = formParticles[i];
    fp.life--; fp.x += fp.vx; fp.y += fp.vy;
    fp.vx *= 0.98; fp.vy *= 0.98;
    if (fp.life <= 0) formParticles.splice(i, 1);
  }
  if (frameNum % 60 === 0 && enemies.filter(e => e.on && e.al).length > 0) {
    const aliveE = enemies.filter(e => e.on && e.al);
    const t = aliveE[Math.floor(Math.random() * aliveE.length)];
    if (t) formParticles.push({ x: t.x + formationX + (Math.random() - 0.5) * 10, y: t.y + (Math.random() - 0.5) * 10, vx: (Math.random() - 0.5) * 0.5, vy: -0.5 - Math.random() * 0.5, life: 20 + Math.random() * 10, c: t.type === 'boss' ? '#ff4444' : t.type === 'boss2' ? '#00ccff' : '#ffff00', sz: 0.3 + Math.random() * 0.3 });
  }

  // Particles (cap)
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].life--; particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
    particles[i].vy += 0.03; particles[i].vx *= 0.96; particles[i].vy *= 0.96;
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 60) particles.splice(0, particles.length - 60);

  // Stars
  for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } }
}

function shootAimed(e, x) {
  const dx = player.x - x, dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 0) {
    const spd = 2.2 + wave * 0.07;
    enemyBullets.push({ x, y: e.y + e.h / 2, vx: (dx / dist) * spd, vy: (dy / dist) * spd, c: e.type === 'boss' ? '#ff8800' : '#ff4444' });
  }
}

function hitPlayer() {
  playSound('bigExplode');
  spawnP(player.x, player.y, '#00ccff', 12);
  shakeTimer = 12; shakeIntensity = 9; flashTimer = 6;
  if (lives <= 0) {
    state = STATE.GAMEOVER;
    if (score > highScore) { highScore = score; localStorage.setItem('galaga_hs', highScore.toString()); }
    playSound('gameover');
    spawnP(player.x, player.y, '#00ffff', 20); spawnP(player.x, player.y, '#ffffff', 10);
    shakeTimer = 18; shakeIntensity = 14; flashTimer = 10;
  } else {
    player.x = W / 2; player.inv = 180; player.dual = false; combo = 0;
    player.vx = 0; player.targetVx = 0; player.caught = false; player.caughtTimer = 0;
  }
}

function spawnP(x, y, c, n) {
  if (particles.length > 55) return;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 0.6 + Math.random() * 2.8;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 18 + Math.random() * 12, c, sz: 0.6 + Math.random() * 1.4 });
  }
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (shakeTimer > 0) {
    ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
    shakeIntensity *= 0.85;
  }

  for (const s of stars) {
    const a = s.alpha * (0.5 + Math.sin(Date.now() * 0.001 + s.phase) * 0.3);
    ctx.globalAlpha = a; ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  if (state === STATE.MENU) drawMenu();
  else if (state === STATE.PLAYING || state === STATE.WAVE_TRANS) drawGame();
  else drawOver();

  if (flashTimer > 0) { ctx.fillStyle = '#ff0000'; ctx.globalAlpha = Math.min(flashTimer / 7, 0.4); ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  if (state === STATE.PLAYING) drawButtons();
}

function drawButtons() {
  ctx.save();
  ctx.fillStyle = touchLeft ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(leftBtnX, leftBtnY, leftBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('<', leftBtnX, leftBtnY); ctx.restore();

  ctx.save();
  ctx.fillStyle = touchRight ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(rightBtnX, rightBtnY, rightBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('>', rightBtnX, rightBtnY); ctx.restore();

  ctx.save();
  ctx.fillStyle = touchFire ? 'rgba(255,80,80,0.25)' : 'rgba(255,255,255,0.12)';
  ctx.strokeStyle = touchFire ? 'rgba(255,100,100,0.5)' : 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(fireBtnX, fireBtnY, fireBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = touchFire ? 'rgba(255,200,200,0.7)' : 'rgba(255,255,255,0.55)';
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('FIRE', fireBtnX, fireBtnY); ctx.restore();
}

function drawMenu() {
  const mt = Date.now() * 0.001;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 25; ctx.fillText('GALAGA', W / 2, H * 0.38);
  ctx.shadowBlur = 0; ctx.font = '17px monospace';
  if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TOUCH TO START', W / 2, H * 0.46);
  ctx.fillStyle = '#ff0'; ctx.font = '13px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore.toString().padStart(8, '0'), W / 2, H * 0.54);
  for (let i = 0; i < 6; i++) {
    const ex = (W * 0.1) + (mt * 20 + i * 55) % W;
    const ey = H * 0.22 + Math.sin(mt * 1.2 + i * 0.9) * 15;
    ctx.globalAlpha = 0.22; ctx.fillStyle = i % 3 === 0 ? '#f22' : (i % 3 === 1 ? '#ff0' : '#f0f');
    ctx.beginPath(); ctx.moveTo(ex, ey - 7); ctx.lineTo(ex - 5, ey); ctx.lineTo(ex, ey + 7); ctx.lineTo(ex + 5, ey);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGame() {
  // HUD
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score.toString().padStart(8, '0'), 10, 20);
  ctx.textAlign = 'right'; ctx.fillStyle = '#f44'; ctx.fillText('LIVES: ' + lives, W - 10, 20);

  // Lives as ship icons
  ctx.textAlign = 'right'; ctx.fillStyle = '#0cf';
  for (let i = 0; i < lives; i++) {
    const lx = W - 10 - i * 16;
    ctx.beginPath(); ctx.moveTo(lx, 32); ctx.lineTo(lx - 5, 40); ctx.lineTo(lx + 5, 40); ctx.closePath(); ctx.fill();
  }

  ctx.textAlign = 'center'; ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
  ctx.fillText('WAVE ' + wave, W / 2, 20);

  // Star rating
  if (wave > 0) {
    const starsToShow = Math.min(5, Math.floor(wave / 5));
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
    let s = ''; for (let i = 0; i < 5; i++) s += i < starsToShow ? '★' : '☆';
    ctx.fillText(s, W / 2, 34);
  }

  // Attack wave indicator
  if (attackWaveActive && nextAttackTime > 0 && nextAttackTime < 120) {
    ctx.fillStyle = '#f00'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
    ctx.globalAlpha = pulse; ctx.fillText('⚠ ATTACK WAVE ⚠', W / 2, 50); ctx.globalAlpha = 1;
  }

  if (combo > 1 && comboTimer > 0) {
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
    ctx.fillText('COMBO x' + (Math.floor(combo / 3) + 1), W / 2, 48);
  }

  // Tractor beam
  if (tractorBeam) {
    ctx.save();
    const tx = tractorBeam.x, ty = tractorBeam.y;
    ctx.strokeStyle = 'rgba(255,50,50,' + (0.3 * tractorBeamAlpha) + ')'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(tx - Math.cos(tractorBeam.angle) * 200, ty - Math.sin(tractorBeam.angle) * 200);
    ctx.lineTo(tx, ty); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,150,150,' + (0.6 * tractorBeamAlpha) + ')'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx - Math.cos(tractorBeam.angle) * 200, ty - Math.sin(tractorBeam.angle) * 200);
    ctx.lineTo(tx, ty); ctx.stroke();
    ctx.fillStyle = 'rgba(255,80,80,' + (0.4 * tractorBeamAlpha) + ')';
    ctx.beginPath(); ctx.arc(tx, ty, 8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Player ship
  ctx.save(); ctx.translate(player.x, player.y);
  if (player.inv > 0 && Math.floor(player.inv / 4) % 2 === 0) ctx.globalAlpha = 0.35;

  const ts = 3 + Math.sin(Date.now() * 0.02) * 2 + player.thrust * 4;
  ctx.fillStyle = '#f60'; ctx.globalAlpha = 0.6 + player.thrust * 0.3;
  ctx.beginPath(); ctx.moveTo(-5, 11); ctx.lineTo(0, 20 + ts); ctx.lineTo(5, 11); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.moveTo(-3, 11); ctx.lineTo(0, 16 + ts); ctx.lineTo(3, 11); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#04a';
  ctx.beginPath(); ctx.moveTo(-9, 3); ctx.lineTo(-14, 15); ctx.lineTo(-4, 11); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9, 3); ctx.lineTo(14, 15); ctx.lineTo(4, 11); ctx.closePath(); ctx.fill();

  ctx.fillStyle = player.inv > 0 ? '#8cf' : '#0cf';
  ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(-9, 4); ctx.lineTo(-4, 13);
  ctx.lineTo(4, 13); ctx.lineTo(9, 4); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(0, -3, 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;

  if (player.dual) {
    ctx.fillStyle = player.inv > 0 ? '#8cf' : '#0cf'; ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.moveTo(-13, 1); ctx.lineTo(-17, 12); ctx.lineTo(-9, 9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13, 1); ctx.lineTo(17, 12); ctx.lineTo(9, 9); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (player.caught) { ctx.strokeStyle = 'rgba(255,50,50,0.5)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.stroke(); }
  ctx.restore();

  // Player bullets
  for (const b of player.bullets) {
    ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 5;
    ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
  }
  ctx.shadowBlur = 0;

  // Enemies
  for (const e of enemies) {
    if (!e.on || !e.al) continue;

    if (e.deathAnim > 0) {
      ctx.save(); ctx.translate(eVis(e), e.y);
      const rot = (18 - e.deathAnim) * 0.15;
      ctx.rotate(rot); ctx.scale(e.deathAnim / 18, e.deathAnim / 18);
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(0, -e.h / 2); ctx.lineTo(-e.w / 2, 0);
      ctx.lineTo(-e.w / 3, e.h / 2); ctx.lineTo(e.w / 3, e.h / 2); ctx.lineTo(e.w / 2, 0);
      ctx.closePath(); ctx.fill(); ctx.restore();
      continue;
    }

    ctx.save(); ctx.translate(eVis(e), e.y);
    const d = ET[e.type];
    ctx.fillStyle = e.ft > 0 ? '#fff' : d.c;
    ctx.shadowColor = e.ft > 0 ? '#fff' : d.c;
    ctx.shadowBlur = e.mhp > 1 ? 5 : 3;

    ctx.beginPath(); ctx.moveTo(0, -e.h / 2); ctx.lineTo(-e.w / 2, 0);
    ctx.lineTo(-e.w / 3, e.h / 2); ctx.lineTo(e.w / 3, e.h / 2); ctx.lineTo(e.w / 2, 0);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = e.ft > 0 ? '#fff' : d.a; ctx.globalAlpha = 0.75;
    const wf = Math.sin(Date.now() * 0.01 + e.ph) * 3;
    ctx.beginPath(); ctx.moveTo(-e.w / 3, -1); ctx.lineTo(-e.w / 2 - 1 + wf, e.h / 3); ctx.lineTo(-e.w / 3, e.h / 4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(e.w / 3, -1); ctx.lineTo(e.w / 2 + 1 - wf, e.h / 3); ctx.lineTo(e.w / 3, e.h / 4); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(-e.w / 5, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.w / 5, -1, 2, 0, Math.PI * 2); ctx.fill();

    if (e.champion) { ctx.fillStyle = '#ff0'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.fillText('★', 0, -e.h / 2 - 4); }

    // Attack wave preview: flash '!' for enemies about to dive
    if (attackWaveActive && e.dt > 0 && e.dt <= 30 && e.st === 'form') {
      if (Math.sin(Date.now() * 0.02) > 0) { ctx.fillStyle = '#f00'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText('!', 0, -e.h / 2 - 8); }
    }

    if (e.mhp > 1 && e.hp < e.mhp) {
      const bw = e.w; ctx.fillStyle = '#333'; ctx.fillRect(-bw / 2, e.h / 2 + 2, bw, 2);
      ctx.fillStyle = e.hp > e.mhp * 0.5 ? '#0f0' : '#f00'; ctx.fillRect(-bw / 2, e.h / 2 + 2, bw * (e.hp / e.mhp), 2);
    }
    ctx.restore();
  }

  // Form particles
  for (const fp of formParticles) {
    ctx.globalAlpha = fp.life / 30; ctx.fillStyle = fp.c;
    ctx.beginPath(); ctx.arc(fp.x, fp.y, fp.sz * (fp.life / 25), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Enemy bullets
  for (const b of enemyBullets) {
    ctx.fillStyle = b.c; ctx.shadowColor = b.c; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 1, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Powerups
  for (const p of powerups) {
    ctx.save();
    const ps = 1 + Math.sin(Date.now() * 0.007) * 0.12;
    ctx.translate(p.x, p.y); ctx.scale(ps, ps);
    ctx.globalAlpha = p.life < 30 ? (Math.sin(Date.now() * 0.02) > 0 ? 1 : 0.3) : 1;
    ctx.fillStyle = '#fc0'; ctx.shadowColor = '#fc0'; ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.moveTo(-6, -4); ctx.lineTo(0, 5); ctx.lineTo(6, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Score popups
  for (const p of scorePopups) {
    ctx.save(); ctx.fillStyle = p.c; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(p.life / 30, 1); ctx.shadowColor = p.c; ctx.shadowBlur = 3;
    ctx.fillText(p.text, p.x, p.y); ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * (p.life / 20), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Wave transition
  if (state === STATE.WAVE_TRANS) {
    ctx.save(); ctx.fillStyle = '#fff'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#f80'; ctx.shadowBlur = 12; ctx.fillText('WAVE ' + wave, W / 2, H / 2 - 8);
    ctx.shadowBlur = 0; ctx.font = '14px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('Get ready...', W / 2, H / 2 + 18); ctx.restore();
  }

  // Wave clear celebration
  if (waveClearTimer > 0) {
    ctx.save(); const fadeIn = Math.min(1, (90 - waveClearTimer) / 15);
    ctx.globalAlpha = fadeIn; ctx.fillStyle = '#ff0'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0'; ctx.shadowBlur = 15; ctx.fillText(waveClearMsg, W / 2, H * 0.3);
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '13px monospace';
    ctx.globalAlpha = fadeIn * 0.7; ctx.fillText('Great job!', W / 2, H * 0.35); ctx.restore();
  }
}

function drawOver() {
  ctx.save();
  ctx.fillStyle = '#f00'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 18; ctx.fillText('GAME OVER', W / 2, H * 0.35);
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '19px monospace';
  ctx.fillText('SCORE: ' + score.toString().padStart(8, '0'), W / 2, H * 0.42);
  ctx.font = '15px monospace'; ctx.fillStyle = '#f80';
  ctx.fillText('WAVE ' + wave, W / 2, H * 0.48);
  ctx.fillStyle = '#aaa'; ctx.fillText('HIGH SCORE: ' + highScore.toString().padStart(8, '0'), W / 2, H * 0.54);

  if (score >= highScore && score > 0) {
    if (Math.sin(Date.now() * 0.006) > 0) {
      ctx.fillStyle = '#ff0'; ctx.font = 'bold 16px monospace'; ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
      ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.6); ctx.shadowBlur = 0;
    }
  }

  ctx.fillStyle = '#ff0'; ctx.font = '12px monospace';
  if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TOUCH TO CONTINUE', W / 2, H * 0.66);
  ctx.restore();

  for (const p of particles) {
    ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * (p.life / 20), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== LOOP =====
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
