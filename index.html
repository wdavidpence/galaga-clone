<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Galaga</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(name) {
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  switch(name) {
    case 'shoot':
      osc.type='square'; osc.frequency.setValueAtTime(880,t);
      osc.frequency.exponentialRampToValueAtTime(440,t+0.05);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      osc.start(t); osc.stop(t+0.09); break;
    case 'explode':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(30,t+0.2);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      osc.start(t); osc.stop(t+0.26); break;
    case 'bigExplode':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(150,t);
      osc.frequency.exponentialRampToValueAtTime(20,t+0.4);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.51); break;
    case 'powerup':
      osc.type='sine'; osc.frequency.setValueAtTime(523,t);
      osc.frequency.setValueAtTime(659,t+0.1);
      osc.frequency.setValueAtTime(784,t+0.2);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.36); break;
    case 'dive':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(300,t);
      osc.frequency.linearRampToValueAtTime(150,t+0.3);
      g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.36); break;
    case 'wave':
      osc.type='square'; osc.frequency.setValueAtTime(440,t);
      osc.frequency.setValueAtTime(554,t+0.15);
      osc.frequency.setValueAtTime(659,t+0.3);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.51); break;
    case 'waveClear':
      osc.type='square'; osc.frequency.setValueAtTime(523,t);
      osc.frequency.setValueAtTime(659,t+0.12);
      osc.frequency.setValueAtTime(784,t+0.24);
      osc.frequency.setValueAtTime(1047,t+0.36);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      osc.start(t); osc.stop(t+0.61); break;
    case 'gameover':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(400,t);
      osc.frequency.linearRampToValueAtTime(80,t+1.0);
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
      osc.start(t); osc.stop(t+1.21); break;
    case 'bossWarn':
      osc.type='square'; osc.frequency.setValueAtTime(800,t);
      osc.frequency.setValueAtTime(600,t+0.1);
      osc.frequency.setValueAtTime(800,t+0.2);
      osc.frequency.setValueAtTime(600,t+0.3);
      g.gain.exponentialRampToValueAtTime(0.08,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      osc.start(t); osc.stop(t+0.36); break;
    case 'tractorBeam':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(80,t);
      osc.frequency.linearRampToValueAtTime(120,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.06,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.51); break;
    case 'beamBreak':
      osc.type='square'; osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(800,t+0.1);
      g.gain.exponentialRampToValueAtTime(0.1,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      osc.start(t); osc.stop(t+0.13); break;
    case 'dualLost':
      osc.type='sawtooth'; osc.frequency.setValueAtTime(600,t);
      osc.frequency.exponentialRampToValueAtTime(100,t+0.3);
      g.gain.exponentialRampToValueAtTime(0.1,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.31); break;
    case 'superExplosion':
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(100,t);
      osc.frequency.setValueAtTime(200,t+0.05);
      osc.frequency.exponentialRampToValueAtTime(20,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.2,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.52); break;
    case 'formationTick':
      osc.type='square'; osc.frequency.setValueAtTime(1200,t);
      g.gain.setValueAtTime(0.04,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
      osc.start(t); osc.stop(t+0.04); break;
    case 'capture':
      osc.type='sine'; osc.frequency.setValueAtTime(200,t);
      osc.frequency.linearRampToValueAtTime(600,t+0.4);
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      osc.start(t); osc.stop(t+0.51); break;
    case 'rescue':
      osc.type='sine'; osc.frequency.setValueAtTime(800,t);
      osc.frequency.setValueAtTime(1000,t+0.08);
      osc.frequency.setValueAtTime(1200,t+0.16);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      osc.start(t); osc.stop(t+0.31); break;
  }
}

// ===== CANVAS =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
const dprMax = 2;
const VERSION = 'v2.0.0';
function playerLaneY() { return H - Math.max(96, Math.min(126, H * 0.145)); }
function enemyTopY() { return Math.max(86, H * 0.125); }

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, dprMax);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resize(); updateBtns(); });
resize();

// ===== GAME STATE =====
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, WAVE_TRANS: 3 };
let state = STATE.MENU;
let score = 0, highScore = parseInt(localStorage.getItem('galaga_hs') || '0');
let lives = 3, wave = 0, combo = 0, comboTimer = 0;
let waveTimer = 0;
let shakeTimer = 0, shakeIntensity = 0;
let flashTimer = 0;
let frameNum = 0;
let gameTime = 0;
let waveClearTimer = 0, waveClearMsg = '';

// Challenge stage flag
let isChallengeStage = false;

// Tractor beam state
let tractorBeam = null;
let tractorBeamTimer = 0;
let tractorBeamAlpha = 0;

// Rescue state - boss has captured player, another ship can rescue
let rescuedShip = null; // {x, y, vx, vy} - the player's captured ship orbiting boss
let rescueActive = false; // true when player is captured and can be rescued

// Stars
let starCount = (W > 600) ? 80 : 60;
let stars = [];
for (let i = 0; i < starCount; i++) stars.push({
  x: Math.random() * W, y: Math.random() * H,
  speed: 0.15 + Math.random() * 0.4, size: 0.4 + Math.random() * 0.8,
  alpha: 0.2 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2
});

let particles = [];
let enemyBullets = [];
let powerups = [];
let scorePopups = [];
let formParticles = [];
let formationX = 0, formationDir = 1;

// ===== PLAYER =====
let player = {
  x: 200, y: 0, w: 28, h: 28,
  vx: 0, targetVx: 0,
  bullets: [], fireRate: 35, fireCD: 0,
  inv: 0, dual: false, thrust: 0,
  caught: false, caughtTimer: 0
};

// ===== ENEMIES =====
let enemies = [];
const ET = {
  bee:    { c: '#2468ff', a: '#ffd21c', hp: 1, sc: 50,  w: 22, h: 20 },
  butterfly: { c: '#ff2a24', a: '#ffffff', hp: 1, sc: 80,  w: 26, h: 22 },
  boss:   { c: '#21e84a', a: '#52a7ff', hp: 2, sc: 150, w: 36, h: 30 },
  boss2:  { c: '#21e84a', a: '#52a7ff', hp: 2, sc: 150, w: 36, h: 30 }
};

// Entry animation groups - enemies fly in from screen edges with loops
let entryGroups = []; // {enemies: [], phase: 'enter'|'settling', timer: 0}
let entryPhase = false; // true during entry animation

// Dive patterns per type
const DIVE_PATTERNS = {
  bee: ['loop', 'sweep', 'zigzag'],
  butterfly: ['adjusting', 'curved', 'swoop'],
  boss: ['capture_run', 'loop_dive', 'straight']
};

function startAttackDive(e, pattern) {
  e.st = 'dive';
  e.divePhase = 0;
  e.diveTimer = 0;
  e.scnt = 0;
  e.attackPattern = pattern;
  e.diveApproachX = player.x + (Math.random() - 0.5) * 100;
  e.diveReturnX = e.hx;
  e.diveReturnY = e.hy;
  e.attackFireRate = 0.025 + wave * 0.003;
  playSound('dive');
}

function mkForm() {
  enemies = [];
  const rowsSpec = [
    { type: 'boss', count: 4, y: enemyTopY(), stagger: 0 },
    { type: 'butterfly', count: 8, y: enemyTopY() + 42, stagger: 1 },
    { type: 'butterfly', count: 8, y: enemyTopY() + 72, stagger: 2 },
    { type: 'bee', count: 10, y: enemyTopY() + 108, stagger: 3 },
    { type: 'bee', count: 10, y: enemyTopY() + 138, stagger: 4 }
  ];
  const maxCols = 10;
  const sp = Math.min(34, (W - 32) / maxCols);
  let idx = 0;
  for (const row of rowsSpec) {
    const sx = W / 2 - ((row.count - 1) * sp) / 2;
    for (let c = 0; c < row.count; c++) {
      const t = row.type;
      const d = ET[t];
      const isChampion = t === 'boss' && c === 1 && wave > 0;
      enemies.push({
        x: sx + c * sp, y: row.y,
        hx: sx + c * sp, hy: row.y,
        w: d.w, h: d.h, hp: d.hp, mhp: d.hp,
        sc: d.sc, type: t, c: d.c, a: d.a, st: 'form',
        ph: Math.random() * Math.PI * 2,
        on: true, al: true,
        sht: 120 + Math.random() * 160,
        dt: t === 'boss' ? 240 + row.stagger * 45 + Math.random() * 220 : -1,
        dp: 0, da: 0, scnt: 0, ft: 0,
        divePhase: 0, diveTimer: 0,
        diveApproachX: 0, diveReturnX: 0, diveReturnY: 0,
        champion: isChampion,
        deathAnim: 0, spawnDelay: idx * 3, spawnAnim: 18,
        attackPattern: 'normal', attackFireRate: 0.012,
        // Entry animation
        entryGroup: -1, // which group this enemy belongs to
        entryStartX: 0, entryStartY: 0,
        entryAngle: 0,
        // Boss capture state
        isCapturing: false,
        captureAngle: 0,
        // Escort count for scoring
        escortCount: 0
      });
      idx++;
    }
  }

  // Assign entry groups: 5 groups, one per row
  entryGroups = [];
  for (let g = 0; g < 5; g++) {
    const groupEnemies = enemies.filter(e => e.spawnDelay === idx - (5 - g) * 10 + Math.floor(Math.random() * 3));
    // Actually assign by row index
  }
  // Re-assign entry groups properly
  let groupIdx = 0;
  for (const row of rowsSpec) {
    const rowEnemies = enemies.filter(e => {
      // Find enemies in this row by hy
      return Math.abs(e.hy - row.y) < 5;
    });
    for (const e of rowEnemies) {
      e.entryGroup = groupIdx;
    }
    entryGroups.push({
      enemies: rowEnemies,
      phase: 'waiting', // waiting -> entering -> settling
      timer: 0,
      startX: -50 + Math.random() * (W + 100), // random edge entry
      startY: -30 - Math.random() * 60,
      angle: Math.atan2(row.y - (-30), row.x - (-50)),
      loopRadius: 80 + Math.random() * 60,
      loopSpeed: 0.02 + Math.random() * 0.015,
      enterSpeed: 1.2 + Math.random() * 0.4,
      settled: false
    });
    groupIdx++;
  }

  powerups = []; scorePopups = []; formParticles = [];
  tractorBeam = null;
  tractorBeamTimer = 420; tractorBeamAlpha = 0;
  player.caught = false; player.caughtTimer = 0;
  rescueActive = false; rescuedShip = null;
  entryPhase = true; // Start with entry animation
}

function eVis(e) { return e.st === 'form' ? e.x + formationX : e.x; }

// ===== INPUT =====
let keys = {};
let touchLeft = false, touchRight = false, touchFire = false;
let lastTouchX = 0, lastTouchY = 0, touchMoving = false;
let leftBtnX = 0, leftBtnY = 0, leftBtnR = 35;
let rightBtnX = 0, rightBtnY = 0, rightBtnR = 35;
let fireBtnX = 0, fireBtnY = 0, fireBtnR = 55;

function updateBtns() {
  const br = Math.max(26, W * 0.09);
  // Left and right movement buttons side by side at bottom left
  const gap = br * 0.8;
  leftBtnX = br + 3; leftBtnY = H - br * 2.5;
  rightBtnX = leftBtnX + gap + br * 1.6; rightBtnY = H - br * 2.5;
  // Fire button at bottom right, near left/right buttons
  fireBtnX = W - br - 3; fireBtnY = H - br * 2.5;
  leftBtnR = rightBtnR = br;
  fireBtnR = Math.max(28, br * 1.05);
}
updateBtns();

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault(); initAudio();
  const x = e.clientX, y = e.clientY;
  if (state === STATE.MENU) { start(); return; }
  if (state === STATE.GAMEOVER) { state = STATE.MENU; return; }
  const dx = x - fireBtnX, dy = y - fireBtnY;
  if (Math.hypot(dx, dy) < fireBtnR * 1.5) { touchFire = true; fire(); return; }
  const dL = x - leftBtnX, dyL = y - leftBtnY;
  if (Math.hypot(dL, dyL) < leftBtnR * 1.4) { touchLeft = true; return; }
  const dR = x - rightBtnX, dyR = y - rightBtnY;
  if (Math.hypot(dR, dyR) < rightBtnR * 1.4) { touchRight = true; return; }
});

canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if (touchMoving) {
    const dx = e.clientX - lastTouchX;
    player.targetVx += dx * 0.32 + (e.clientX - player.x) * 0.018;
    lastTouchX = e.clientX;
    lastTouchY = e.clientY;
  }
});

canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  touchMoving = false; touchLeft = false; touchRight = false; touchFire = false;
});

canvas.addEventListener('pointercancel', (e) => {
  e.preventDefault();
  touchMoving = false; touchLeft = false; touchRight = false; touchFire = false;
});

document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

document.addEventListener('keydown', (e) => {
  keys[e.key] = true; initAudio();
  if (state === STATE.MENU) { start(); return; }
  if (state === STATE.GAMEOVER) { state = STATE.MENU; return; }
  if (e.key === ' ' || e.key === 'j' || e.key === 'J') {
    e.preventDefault();
    if (player.fireCD <= 0) fire();
  }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function fire() {
  if (player.fireCD > 0) return;
  const bulletCap = player.dual ? 4 : 2;
  if (player.bullets.length >= bulletCap) return;
  player.fireCD = Math.max(12, player.fireRate - 9);
  playSound('shoot');
  if (player.dual) {
    player.bullets.push({ x: player.x - 5, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
    player.bullets.push({ x: player.x + 5, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
  } else {
    player.bullets.push({ x: player.x, y: player.y - 16, vy: -12, vx: 0, color: '#00ffff' });
  }
}

function start() {
  state = STATE.PLAYING;
  score = 0; lives = 3; wave = 0; combo = 0; comboTimer = 0;
  player.x = W / 2; player.y = playerLaneY();
  player.bullets = []; player.fireCD = 0; player.inv = 150; player.dual = false;
  player.vx = 0; player.targetVx = 0; player.thrust = 0;
  player.caught = false; player.caughtTimer = 0;
  enemyBullets = []; particles = []; powerups = []; scorePopups = [];
  formParticles = [];
  shakeTimer = 0; flashTimer = 0; frameNum = 0; gameTime = 0;
  waveClearTimer = 0; waveClearMsg = '';
  tractorBeam = null; tractorBeamTimer = 0; tractorBeamAlpha = 0;
  rescueActive = false; rescuedShip = null;
  mkForm();
}

// ===== UPDATE =====
function update() {
  frameNum++;

  if (state === STATE.MENU) {
    for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } }
    return;
  }
  if (state === STATE.GAMEOVER) {
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].life--; particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;
    return;
  }
  if (state === STATE.WAVE_TRANS) {
    waveTimer--;
    if (waveTimer <= 0) { state = STATE.PLAYING; mkForm(); playSound('wave'); }
    return;
  }

  // === PLAYING ===
  player.inv = Math.max(0, player.inv - 1);
  player.fireCD = Math.max(0, player.fireCD - 1);
  if (touchFire) fire();
  if (comboTimer > 0) { comboTimer--; } else { combo = 0; }
  if (shakeTimer > 0) shakeTimer--;
  if (flashTimer > 0) flashTimer--;
  if (waveClearTimer > 0) waveClearTimer--;
  gameTime++;

  // === ENTRY ANIMATION ===
  if (entryPhase) {
    let allSettled = true;
    for (const g of entryGroups) {
      if (g.phase === 'waiting') {
        // Wait for staggered start
        g.timer++;
        if (g.timer >= g.enemies.length * 2) {
          g.phase = 'entering';
          g.timer = 0;
        }
        allSettled = false;
      } else if (g.phase === 'entering') {
        g.timer++;
        const t = g.timer * g.loopSpeed;
        for (const e of g.enemies) {
          if (!e.on || !e.al) continue;
          // Loop-de-loop entry: spiral in toward formation position
          const loopX = g.startX + Math.cos(t) * g.loopRadius * (1 - g.timer / 200);
          const loopY = g.startY + Math.sin(t) * g.loopRadius * 0.6 * (1 - g.timer / 200);
          const targetX = e.hx + formationX;
          const targetY = e.hy;
          const progress = Math.min(1, g.timer / 180);
          e.x = loopX + (targetX - loopX) * progress;
          e.y = loopY + (targetY - loopY) * progress;
          e.st = 'form'; // During entry, enemies are in "form" state visually
        }
        if (g.timer > 200) {
          g.phase = 'settling';
          g.timer = 0;
        }
        allSettled = false;
      } else if (g.phase === 'settling') {
        g.timer++;
        for (const e of g.enemies) {
          if (!e.on || !e.al) continue;
          const tx = e.hx + formationX;
          const ty = e.hy;
          e.x += (tx - e.x) * 0.15;
          e.y += (ty - e.y) * 0.15;
        }
        if (g.timer > 30) {
          g.phase = 'done';
          // Start dive timers for this group
          for (const e of g.enemies) {
            if (e.on && e.al) {
              e.dt = 120 + Math.random() * 180;
            }
          }
        }
        allSettled = false;
      }
    }
    if (allSettled) {
      entryPhase = false;
      // All enemies have dive timers set
    }
  }

  // === FORMATION DRIFT ===
  const driftSpeed = 0.25 + wave * 0.03;
  formationX += formationDir * driftSpeed;
  const edgeMargin = Math.max(14, W * 0.055);
  if (formationX > edgeMargin) { formationDir = -1; shakeTimer = 3; }
  else if (formationX < -edgeMargin) { formationDir = 1; shakeTimer = 3; }

  // === FORMATION TICK SOUND ===
  // Galaga has a tick sound when formation is active - urgency as enemies die
  if (frameNum % 60 === 0 && enemies.filter(e => e.on && e.al).length > 0) {
    const alive = enemies.filter(e => e.on && e.al).length;
    const total = enemies.length;
    const ratio = alive / total;
    // Faster tick as more enemies die (urgency)
    if (Math.random() < (1 - ratio) * 0.3) {
      playSound('formationTick');
    }
  }

  // === TRACTOR BEAM ===
  tractorBeamTimer--;
  const champions = enemies.filter(e => e.on && e.al && e.champion && e.st === 'form');
  if (champions.length > 0 && tractorBeam === null && tractorBeamTimer <= 0 && !rescueActive) {
    const champ = champions[Math.floor(Math.random() * champions.length)];
    if (champ.dt <= 0) {
      // Boss stops and aims tractor beam at player
      champ.isCapturing = true;
      const angle = Math.atan2(player.y - champ.y, player.x - champ.x);
      const beamDist = 200 + Math.random() * 80;
      tractorBeam = {
        x: champ.x + Math.cos(angle) * beamDist,
        y: champ.y + Math.sin(angle) * beamDist,
        angle, timer: 100, // Longer beam duration
        sourceX: champ.x, sourceY: champ.y,
        coneAngle: 0.3 // Wider cone
      };
      tractorBeamTimer = 300 + Math.random() * 200;
      playSound('bossWarn');
    }
  }

  if (tractorBeam) {
    tractorBeam.timer--;
    tractorBeamAlpha = Math.min(1, tractorBeamAlpha + 0.06);
    if (tractorBeam.timer <= 0) {
      tractorBeamAlpha = 0; playSound('beamBreak'); tractorBeam = null;
      // Boss resumes normal behavior
      for (const e of enemies) { if (e.isCapturing) e.isCapturing = false; }
    }
    // Wider capture zone - conical beam
    if (tractorBeamAlpha > 0.4 && !player.caught && !rescueActive) {
      const bx = tractorBeam.x, by = tractorBeam.y;
      // Check if player is within the cone from boss source
      const dx = player.x - tractorBeam.sourceX;
      const dy = player.y - tractorBeam.sourceY;
      const dist = Math.hypot(dx, dy);
      const angleToPlayer = Math.atan2(dy, dx);
      let angleDiff = angleToPlayer - tractorBeam.angle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      // Capture if within cone and reasonable distance
      if (Math.abs(angleDiff) < tractorBeam.coneAngle && dist < 280 && dist > 30) {
        player.caught = true; player.caughtTimer = 0;
      }
    }
    if (player.caught) {
      player.caughtTimer++;
      const bx = tractorBeam.x, by = tractorBeam.y;
      const dx = bx - player.x, dy = by - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 5) { player.x += (dx / dist) * 0.3; player.y += (dy / dist) * 0.3; }
      if (player.caughtTimer > 180) {
        // Player fully captured!
        if (player.dual) { player.dual = false; playSound('dualLost'); }
        // Set up rescue state - player's ship orbits the boss
        rescueActive = true;
        const capturingBoss = enemies.find(e => e.isCapturing && e.on && e.al);
        if (capturingBoss) {
          rescuedShip = { x: capturingBoss.x, y: capturingBoss.y, angle: 0 };
          player.caught = false; player.caughtTimer = 0;
          tractorBeamAlpha = 0; tractorBeam = null;
          playSound('capture');
        } else {
          player.caught = false; player.caughtTimer = 0;
          tractorBeamAlpha = 0; tractorBeam = null;
        }
      }
    }
  }

  // === RESCUE MECHANIC ===
  if (rescueActive && rescuedShip) {
    // Find the boss that captured the player
    const capturingBoss = enemies.find(e => e.isCapturing && e.on && e.al);
    if (capturingBoss) {
      // Player's ship orbits the boss
      rescuedShip.angle += 0.03;
      const orbitRadius = 25;
      rescuedShip.x = capturingBoss.x + Math.cos(rescuedShip.angle) * orbitRadius;
      rescuedShip.y = capturingBoss.y + Math.sin(rescuedShip.angle) * orbitRadius;

      // If boss is destroyed while player is captured, auto-rescue
      if (!capturingBoss.on || !capturingBoss.al) {
        rescueActive = false;
        rescuedShip = null;
        playSound('rescue');
        // Player appears at boss's old position
        player.x = capturingBoss.hx + formationX;
        player.y = capturingBoss.hy;
        player.inv = 90;
      }

      // If player shoots the capturing boss, rescue!
      for (const b of player.bullets) {
        if (Math.hypot(b.x - capturingBoss.x, b.y - capturingBoss.y) < 20) {
          // Hit the boss - rescue!
          b.hit = true; // Mark for removal
          rescueActive = false;
          rescuedShip = null;
          playSound('rescue');
          player.x = capturingBoss.hx + formationX;
          player.y = capturingBoss.hy;
          player.inv = 90;
          // Bonus points for rescue
          score += 200;
          scorePopups.push({ x: player.x, y: player.y - 20, text: '+200 RESCUE!', life: 60, c: '#00ff88' });
        }
      }
    } else {
      // Boss gone, auto-rescue
      rescueActive = false;
      rescuedShip = null;
    }
  }

  // === TOUCH / KEYBOARD MOVEMENT ===
  if (touchLeft) player.targetVx -= 0.4;
  if (touchRight) player.targetVx += 0.4;
  if (keys['ArrowLeft'] || keys['a']) player.targetVx -= 0.4;
  if (keys['ArrowRight'] || keys['d']) player.targetVx += 0.4;

  // Physics
  const friction = 0.88;
  player.targetVx *= friction;
  player.targetVx = Math.max(-6, Math.min(6, player.targetVx));
  player.vx += (player.targetVx - player.vx) * 0.25;
  player.x += player.vx;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = playerLaneY();
  player.thrust = Math.abs(player.vx) / 5;

  // Player bullets
  for (let i = player.bullets.length - 1; i >= 0; i--) {
    const b = player.bullets[i];
    if (b.hit) { player.bullets.splice(i, 1); continue; }
    b.y += b.vy;
    if (b.y < -25) player.bullets.splice(i, 1);
  }

  // === ENEMIES ===
  for (const e of enemies) {
    if (!e.on || !e.al) continue;
    e.ft = Math.max(0, e.ft - 1);

    if (e.deathAnim > 0) { e.deathAnim--; continue; }

    if (e.st === 'form') {
      // Formation oscillation - Galaga style "throbbing"
      e.y = e.hy + Math.sin(Date.now() * 0.0015 + e.ph) * 2;
      if (e.dt > 0 && !(e.champion && tractorBeam !== null)) {
        e.dt--;
        if (e.dt <= 0) {
          // Choose dive pattern based on enemy type
          const patterns = DIVE_PATTERNS[e.type] || ['normal'];
          const pattern = patterns[Math.floor(Math.random() * patterns.length)];
          e.st = 'dive'; e.divePhase = 0; e.diveTimer = 0; e.scnt = 0;
          e.diveApproachX = player.x + (Math.random() - 0.5) * 60;
          e.attackPattern = pattern; e.attackFireRate = 0.003 + wave * 0.0004;
          playSound('dive');
        }
      }
      if (e.sht <= 0 && e.scnt < 1 && Math.random() < 0.0004) {
        e.sht = 80; e.scnt++;
        shootAimed(e, eVis(e));
      }
    }

    if (e.st === 'dive') {
      e.diveTimer++;
      const dx = player.x - e.x, dy = player.y - e.y;

      if (e.divePhase === 0) {
        // Approach phase - different per type
        if (e.attackPattern === 'loop') {
          // Bee: large loop dive
          e.x += Math.cos(e.diveTimer * 0.06) * 2;
          e.y += 1.0;
        } else if (e.attackPattern === 'adjusting') {
          // Butterfly: adjusts path based on player position
          e.x += (dx > 0 ? 0.4 : -0.4);
          e.y += 0.9;
        } else if (e.attackPattern === 'capture_run') {
          // Boss: straight capture run toward player
          e.x += (dx / Math.max(1, Math.abs(dx))) * 2.5;
          e.y += 1.8;
        } else if (e.attackPattern === 'loop_dive') {
          // Boss: loop dive
          e.x += Math.cos(e.diveTimer * 0.05) * 1.8;
          e.y += 1.2;
        } else if (e.attackPattern === 'sweep') {
          // Bee: wide sweep
          e.x += Math.sin(e.diveTimer * 0.08) * 2.5;
          e.y += 1.0;
        } else if (e.attackPattern === 'curved') {
          // Butterfly: curved path
          e.x += Math.cos(e.diveTimer * 0.07) * 1.5;
          e.y += 1.1;
        } else if (e.attackPattern === 'zigzag') {
          e.x += Math.sin(e.diveTimer * 0.1) * 1.5;
          e.y += 0.8;
        } else if (e.attackPattern === 'swoop') {
          // Butterfly: swoops toward player at end
          e.x += (dx > 0 ? 0.5 : -0.5);
          e.y += 1.3;
        } else {
          // Normal dive
          e.x += (e.diveApproachX - e.x) * 0.04;
          e.y += 0.8;
        }
        if (e.diveTimer > 50 || Math.abs(e.x - e.diveApproachX) < 18) { e.divePhase = 1; e.diveTimer = 0; }
      } else if (e.divePhase === 1) {
        // Attack phase - different per type
        const diveAngle = Math.atan2(dy, dx);
        if (e.attackPattern === 'capture_run') {
          // Boss capture run: tries to reach player
          e.x += Math.cos(diveAngle) * 2.8;
          e.y += Math.sin(diveAngle) * 2.8;
        } else if (e.attackPattern === 'loop') {
          // Bee loop: continues past player
          e.x += Math.cos(diveAngle) * 1.8;
          e.y += Math.sin(diveAngle) * 1.8;
        } else if (e.attackPattern === 'adjusting') {
          // Butterfly: adjusts at dive end based on player position
          e.x += Math.cos(diveAngle) * 1.6;
          e.y += Math.sin(diveAngle) * 1.6;
          // Subtle adjustment toward player
          e.x += (dx > 0 ? 0.2 : -0.2);
        } else if (e.attackPattern === 'loop_dive') {
          e.x += Math.cos(diveAngle) * 1.5;
          e.y += Math.sin(diveAngle) * 1.5;
        } else if (e.attackPattern === 'sweep') {
          e.x += Math.cos(diveAngle) * 1.5;
          e.y += Math.sin(diveAngle) * 1.5;
        } else if (e.attackPattern === 'swoop') {
          e.x += Math.cos(diveAngle) * 2.0;
          e.y += Math.sin(diveAngle) * 2.0;
        } else {
          e.x += Math.cos(diveAngle) * 1.5;
          e.y += Math.sin(diveAngle) * 1.5;
        }
        // Return after conditions
        if (e.diveTimer > 55 || e.y > player.y + 40 || e.y > H + 20 || e.x < -60 || e.x > W + 60) {
          e.divePhase = 2; e.diveTimer = 0;
        }
      } else if (e.divePhase === 2) {
        // Return to formation
        const tx = e.hx + formationX;
        const ty = e.hy;
        if (e.y > ty + 3) {
          e.x += (tx - e.x) * 0.12;
          e.y -= 4.0;
        } else {
          e.x += (tx - e.x) * 0.18;
          e.y += (ty - e.y) * 0.15;
        }
        if (Math.hypot(e.x - tx, e.y - ty) < 12 || e.diveTimer > 100) {
          e.st = 'form'; e.divePhase = 0; e.diveTimer = 0;
          e.x = e.hx; e.y = e.hy;
          const restFrames = e.type === 'boss' ? 200 + Math.random() * 250 : 110 + Math.random() * 130;
          e.dt = restFrames;
          e.attackPattern = 'normal'; e.scnt = 0;
        }
      }

      // Shooting during dive - more aggressive
      if (e.scnt < 1 && Math.random() < e.attackFireRate) {
        e.scnt++; shootAimed(e, e.x);
      }
    }

    if (e.st === 'retreat') {
      e.x += Math.cos(e.da) * 1.5; e.y += Math.sin(e.da) * 1.5;
      if (e.y < -40) { e.st = 'form'; e.x = e.hx; e.y = e.hy; }
    }
  }

  // === ENEMY BULLETS ===
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    const spd = Math.hypot(b.vx, b.vy);
    if (spd > 3.5) { b.vx = (b.vx / spd) * 3.5; b.vy = (b.vy / spd) * 3.5; }
    if (b.y > H + 20 || b.x < -20 || b.x > W + 20) { enemyBullets.splice(i, 1); continue; }
    if (player.inv <= 0 && !player.caught) {
      if (b.x > player.x - 16 && b.x < player.x + 16 && b.y > player.y - 14 && b.y < player.y + 14) {
        enemyBullets.splice(i, 1); hitPlayer();
      }
    }
  }

  // === PLAYER BULLETS vs ENEMIES ===
  for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
    const b = player.bullets[bi];
    if (b.hit) continue;
    for (const e of enemies) {
      if (!e.on || !e.al || e.deathAnim > 0) continue;
      const ex = eVis(e);
      if (b.x > ex - 14 && b.x < ex + 14 && b.y > e.y - 12 && b.y < e.y + 12) {
        player.bullets.splice(bi, 1);
        e.hp--; e.ft = 5;
        if (e.hp <= 0) {
          // Calculate escort multiplier
          const escorts = enemies.filter(en => en.on && en.al && en.type === e.type && en !== e).length;
          const multiplier = 1 + escorts * 0.5; // +50% per escort
          const diveBonus = e.st === 'dive' ? 2 : 1;
          const pts = Math.floor(e.sc * multiplier * diveBonus);

          e.deathAnim = 18;
          score += pts; combo++; comboTimer = 100;
          scorePopups.push({ x: ex, y: e.y, text: '+' + pts.toString(), life: 50, c: '#ffff00' });
          if (escorts > 0) {
            scorePopups.push({ x: ex, y: e.y + 12, text: 'x' + (1 + escorts * 0.5).toFixed(1), life: 40, c: '#ff8800' });
          }
          shakeTimer = 4; shakeIntensity = 3;
        } else spawnP(b.x, b.y, '#ffffff', 2);
        break;
      }
    }
  }

  // === SPAWN EXPLOSIONS ===
  for (const e of enemies) {
    if (e.deathAnim === 1 && e.on && e.al) {
      const ex = eVis(e); e.on = false; e.al = false;
      playSound('explode'); spawnP(ex, e.y, (ET[e.type]||{}).c || e.c || '#ffffff', 10); spawnP(ex, e.y, '#fff', 4);
      if (e.type === 'boss' || e.type === 'boss2') {
        shakeTimer = 6; shakeIntensity = 5; spawnP(ex, e.y, '#fff', 6);
        if (e.type === 'boss2') { shakeTimer = 8; shakeIntensity = 7; }
      }
      if ((e.type === 'boss' || e.type === 'boss2') && Math.random() < 0.35) {
        powerups.push({ x: ex, y: e.y, vy: 1, t: 'dual', life: 350, w: 20, h: 10 });
      }
    }
  }

  // === ENEMY COLLISION ===
  for (const e of enemies) {
    if (!e.on || !e.al || e.deathAnim > 0 || player.inv > 0) continue;
    const ex = eVis(e);
    if (Math.hypot(ex - player.x, e.y - player.y) < Math.max(e.w, e.h) / 2 + player.w / 2 - 3) {
      e.on = false; e.al = false; lives--; hitPlayer();
    }
  }

  // === WAVE CLEAR ===
  const alive = enemies.filter(e => e.on && e.al).length;
  if (alive === 0 && enemies.length > 0) {
    wave++;
    state = STATE.WAVE_TRANS;
    waveTimer = 100;
    waveClearTimer = 90;
    waveClearMsg = isChallengeStage ? '★ CHALLENGE CLEAR ★' : 'WAVE ' + wave + ' CLEAR';
    playSound('waveClear');
    for (let i = 0; i < 5; i++) {
      const bx = Math.random() * W, by = H * 0.3 + Math.random() * H * 0.3;
      const cols = ['#ff0', '#f0f', '#0ff', '#f80', '#fff'];
      spawnP(bx, by, cols[Math.floor(Math.random() * cols.length)], 8);
    }
    shakeTimer = 10; shakeIntensity = 10; flashTimer = 5;
    isChallengeStage = false;
  }

  // === POWERUPS ===
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy; p.life--;
    if (p.life <= 0 || p.y > H + 20) { powerups.splice(i, 1); continue; }
    if (Math.abs(p.x - player.x) < 22 && Math.abs(p.y - player.y) < 22) {
      player.dual = true; playSound('powerup'); spawnP(p.x, p.y, '#ffcc00', 8); powerups.splice(i, 1);
    }
  }

  // === SCORE POPUPS ===
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life--; scorePopups[i].y -= 0.4;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  // === FORM PARTICLES ===
  for (let i = formParticles.length - 1; i >= 0; i--) {
    const fp = formParticles[i];
    fp.life--; fp.x += fp.vx; fp.y += fp.vy;
    fp.vx *= 0.98; fp.vy *= 0.98;
    if (fp.life <= 0) formParticles.splice(i, 1);
  }
  if (frameNum % 60 === 0 && enemies.filter(e => e.on && e.al).length > 0) {
    const aliveE = enemies.filter(e => e.on && e.al);
    const t = aliveE[Math.floor(Math.random() * aliveE.length)];
    if (t) formParticles.push({ x: t.x + formationX + (Math.random() - 0.5) * 10, y: t.y + (Math.random() - 0.5) * 10, vx: (Math.random() - 0.5) * 0.5, vy: -0.5 - Math.random() * 0.5, life: 20 + Math.random() * 10, c: t.type === 'boss' ? '#ff4444' : t.type === 'boss2' ? '#00ccff' : '#ffff00', sz: 0.3 + Math.random() * 0.3 });
  }

  // === PARTICLES ===
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].life--; particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
    particles[i].vy += 0.03; particles[i].vx *= 0.96; particles[i].vy *= 0.96;
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 60) particles.splice(0, particles.length - 60);

  // === STARS ===
  for (const s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } }
}

function shootAimed(e, x) {
  const dx = player.x - x, dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 0) {
    const spd = 2.5 + wave * 0.08; // Faster bullets with waves
    enemyBullets.push({ x, y: e.y + e.h / 2, vx: (dx / dist) * spd, vy: (dy / dist) * spd, c: e.type === 'boss' ? '#ff8800' : '#ff4444' });
  }
}

function hitPlayer() {
  playSound('bigExplode');
  spawnP(player.x, player.y, '#00ccff', 12);
  shakeTimer = 12; shakeIntensity = 9; flashTimer = 6;
  if (lives <= 0) {
    state = STATE.GAMEOVER;
    if (score > highScore) { highScore = score; localStorage.setItem('galaga_hs', highScore.toString()); }
    playSound('gameover');
    spawnP(player.x, player.y, '#00ffff', 20); spawnP(player.x, player.y, '#ffffff', 10);
    shakeTimer = 18; shakeIntensity = 14; flashTimer = 10;
  } else {
    player.x = W / 2; player.inv = 180; player.dual = false; combo = 0;
    player.vx = 0; player.targetVx = 0; player.caught = false; player.caughtTimer = 0;
    // Cancel rescue if active
    rescueActive = false; rescuedShip = null;
  }
}

function spawnP(x, y, c, n) {
  if (particles.length > 55) return;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 0.6 + Math.random() * 2.8;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 18 + Math.random() * 12, c, sz: 0.6 + Math.random() * 1.4 });
  }
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (shakeTimer > 0) {
    ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
    shakeIntensity *= 0.85;
  }

  for (const s of stars) {
    const a = s.alpha * (0.5 + Math.sin(Date.now() * 0.001 + s.phase) * 0.3);
    ctx.globalAlpha = a; ctx.fillStyle = '#fff'; ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  if (state === STATE.MENU) drawMenu();
  else if (state === STATE.PLAYING || state === STATE.WAVE_TRANS) drawGame();
  else drawOver();

  if (flashTimer > 0) { ctx.fillStyle = '#ff0000'; ctx.globalAlpha = Math.min(flashTimer / 7, 0.4); ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
  if (state === STATE.PLAYING) drawButtons();
}

function drawButtons() {
  ctx.save();
  ctx.fillStyle = touchLeft ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(leftBtnX, leftBtnY, leftBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('<', leftBtnX, leftBtnY); ctx.restore();

  ctx.save();
  ctx.fillStyle = touchRight ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(rightBtnX, rightBtnY, rightBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('>', rightBtnX, rightBtnY); ctx.restore();

  ctx.save();
  ctx.fillStyle = touchFire ? 'rgba(255,80,80,0.25)' : 'rgba(255,255,255,0.12)';
  ctx.strokeStyle = touchFire ? 'rgba(255,100,100,0.5)' : 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(fireBtnX, fireBtnY, fireBtnR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = touchFire ? 'rgba(255,200,200,0.7)' : 'rgba(255,255,255,0.55)';
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('FIRE', fireBtnX, fireBtnY); ctx.restore();
}

function drawMenu() {
  const mt = Date.now() * 0.001;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 25; ctx.fillText('GALAGA', W / 2, H * 0.38);
  ctx.shadowBlur = 0; ctx.font = '17px monospace';
  if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TOUCH TO START', W / 2, H * 0.46);
  ctx.fillStyle = '#7cf'; ctx.font = '12px monospace'; ctx.fillText('LEFT SIDE STEERS  •  RIGHT SIDE FIRES', W / 2, H * 0.50);
  ctx.fillStyle = '#ff0'; ctx.font = '13px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore.toString().padStart(8, '0'), W / 2, H * 0.54);
  ctx.fillStyle = '#666'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
  ctx.fillText(VERSION, W - 15, H - 10);
  // Animated enemy formation on menu
  for (let i = 0; i < 6; i++) {
    const ex = (W * 0.1) + (mt * 15 + i * 55) % W;
    const ey = H * 0.22 + Math.sin(mt * 1.2 + i * 0.9) * 15;
    ctx.globalAlpha = 0.22; ctx.fillStyle = i % 3 === 0 ? '#f22' : (i % 3 === 1 ? '#ff0' : '#f0f');
    ctx.beginPath(); ctx.moveTo(ex, ey - 7); ctx.lineTo(ex - 5, ey); ctx.lineTo(ex, ey + 7); ctx.lineTo(ex + 5, ey);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawGame() {
  // HUD
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score.toString().padStart(8, '0'), 10, 20);
  ctx.textAlign = 'right'; ctx.fillStyle = '#f44'; ctx.fillText('LIVES: ' + lives, W - 10, 20);

  // Lives as ship icons
  ctx.textAlign = 'right'; ctx.fillStyle = '#0cf';
  for (let i = 0; i < lives; i++) {
    const lx = W - 10 - i * 16;
    ctx.beginPath(); ctx.moveTo(lx, 32); ctx.lineTo(lx - 5, 40); ctx.lineTo(lx + 5, 40); ctx.closePath(); ctx.fill();
  }

  ctx.textAlign = 'center'; ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
  ctx.fillText('WAVE ' + wave, W / 2, 20);

  // Star rating
  if (wave > 0) {
    const starsToShow = Math.min(5, Math.floor(wave / 5));
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
    let s = ''; for (let i = 0; i < 5; i++) s += i < starsToShow ? '★' : '☆';
    ctx.fillText(s, W / 2, 34);
  }

  // Challenge stage indicator
  if (isChallengeStage) {
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('★ CHALLENGE STAGE ★', W / 2, 48);
  }

  // Rescue indicator
  if (rescueActive) {
    ctx.fillStyle = '#0f0'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
    ctx.globalAlpha = pulse; ctx.fillText('★ SHOOT THE BOSS TO RESCUE ★', W / 2, 48); ctx.globalAlpha = 1;
  }

  if (combo > 1 && comboTimer > 0) {
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
    ctx.fillText('COMBO x' + (Math.floor(combo / 3) + 1), W / 2, 60);
  }

  // === TRACTOR BEAM (conical) ===
  if (tractorBeam) {
    ctx.save();
    const bx = tractorBeam.x, by = tractorBeam.y;
    const sx = tractorBeam.sourceX, sy = tractorBeam.sourceY;
    const alpha = 0.3 * tractorBeamAlpha;
    // Draw conical beam from boss to capture point
    ctx.strokeStyle = 'rgba(255,50,50,' + alpha + ')'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(bx, by); ctx.stroke();
    // Wider cone effect
    ctx.strokeStyle = 'rgba(255,100,100,' + (alpha * 0.5) + ')'; ctx.lineWidth = 3;
    const coneLen = 200;
    const ca = tractorBeam.coneAngle;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(tractorBeam.angle - ca) * coneLen, sy + Math.sin(tractorBeam.angle - ca) * coneLen);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(tractorBeam.angle + ca) * coneLen, sy + Math.sin(tractorBeam.angle + ca) * coneLen);
    ctx.stroke();
    // Glow at capture point
    ctx.fillStyle = 'rgba(255,80,80,' + (0.5 * tractorBeamAlpha) + ')';
    ctx.beginPath(); ctx.arc(bx, by, 10, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // === RESCUE SHIP (player's captured ship orbiting boss) ===
  if (rescueActive && rescuedShip) {
    ctx.save(); ctx.translate(rescuedShip.x, rescuedShip.y);
    // Small version of player ship
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-4, 3); ctx.lineTo(-8, 8); ctx.lineTo(0, 5); ctx.lineTo(8, 8); ctx.lineTo(4, 3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e21b2d'; ctx.fillRect(-2, -2, 4, 8);
    // Pulsing glow to show it's the player's ship
    const pulse = Math.sin(Date.now() * 0.01) * 0.3 + 0.7;
    ctx.strokeStyle = 'rgba(0,255,255,' + pulse + ')'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  // === PLAYER SHIP ===
  ctx.save(); ctx.translate(player.x, player.y);
  if (player.inv > 0 && Math.floor(player.inv / 4) % 2 === 0) ctx.globalAlpha = 0.35;
  const ts = 3 + Math.sin(Date.now() * 0.02) * 2 + player.thrust * 3;
  ctx.fillStyle = '#ff6b00'; ctx.globalAlpha *= 0.75;
  ctx.beginPath(); ctx.moveTo(-4, 12); ctx.lineTo(0, 19 + ts); ctx.lineTo(4, 12); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = player.inv > 0 && Math.floor(player.inv / 4) % 2 === 0 ? 0.35 : 1;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-7, 5); ctx.lineTo(-14, 15); ctx.lineTo(-4, 11); ctx.lineTo(0, 16); ctx.lineTo(4, 11); ctx.lineTo(14, 15); ctx.lineTo(7, 5); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e21b2d'; ctx.fillRect(-3, -7, 6, 19);
  ctx.fillStyle = '#1d56ff';
  ctx.beginPath(); ctx.moveTo(-11, 8); ctx.lineTo(-17, 16); ctx.lineTo(-6, 13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(11, 8); ctx.lineTo(17, 16); ctx.lineTo(6, 13); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#74d7ff'; ctx.shadowColor = '#74d7ff'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(0, -3, 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  if (player.dual) {
    ctx.globalAlpha = 0.9;
    for (const off of [-18, 18]) {
      ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.moveTo(off, -10); ctx.lineTo(off - 7, 10); ctx.lineTo(off, 15); ctx.lineTo(off + 7, 10); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e21b2d'; ctx.fillRect(off - 2, -3, 4, 13);
    }
    ctx.globalAlpha = 1;
  }
  if (player.caught) { ctx.strokeStyle = 'rgba(255,240,80,0.65)'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, 0, 19, 0, Math.PI * 2); ctx.stroke(); }
  ctx.restore();

  // === PLAYER BULLETS ===
  for (const b of player.bullets) {
    ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 5;
    ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
  }
  ctx.shadowBlur = 0;

  // === ENEMIES ===
  for (const e of enemies) {
    if (!e.on || !e.al) continue;
    const ex = eVis(e);
    const d = ET[e.type] || ET.bee;
    if (e.deathAnim > 0) {
      ctx.save(); ctx.translate(ex, e.y);
      const k = e.deathAnim / 18;
      ctx.rotate((18 - e.deathAnim) * 0.18);
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
      ctx.globalAlpha = Math.max(0.15, k);
      ctx.beginPath(); ctx.moveTo(0, -e.h * k); ctx.lineTo(-e.w * 0.55 * k, 0); ctx.lineTo(0, e.h * 0.45 * k); ctx.lineTo(e.w * 0.55 * k, 0); ctx.closePath(); ctx.fill();
      ctx.restore(); continue;
    }
    ctx.save(); ctx.translate(ex, e.y);
    const flash = e.ft > 0;

    if (e.type === 'boss') {
      ctx.fillStyle = flash ? '#fff' : (e.hp < e.mhp ? '#2678ff' : d.c); ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 5;
      // Boss Galaga sprite - more detailed
      ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-18, -5); ctx.lineTo(-15, 10); ctx.lineTo(-6, 15); ctx.lineTo(0, 8); ctx.lineTo(6, 15); ctx.lineTo(15, 10); ctx.lineTo(18, -5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = flash ? '#fff' : '#ffd21c'; ctx.beginPath(); ctx.arc(-7, -2, 3, 0, Math.PI * 2); ctx.arc(7, -2, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff3030'; ctx.fillRect(-4, -11, 8, 5);
      // Boss crown/crest
      ctx.fillStyle = flash ? '#fff' : '#ffcc00';
      ctx.beginPath(); ctx.moveTo(-8, -14); ctx.lineTo(-6, -18); ctx.lineTo(-2, -14); ctx.lineTo(0, -20); ctx.lineTo(2, -14); ctx.lineTo(6, -18); ctx.lineTo(8, -14); ctx.closePath(); ctx.fill();
    } else if (e.type === 'butterfly') {
      // Butterfly - wider wings, more colorful
      ctx.fillStyle = flash ? '#fff' : d.c; ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 4;
      // Body
      ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(-4, -4); ctx.lineTo(-3, 10); ctx.lineTo(0, 13); ctx.lineTo(3, 10); ctx.lineTo(4, -4); ctx.closePath(); ctx.fill();
      // Wings - animate based on phase
      const wingFlap = Math.sin(Date.now() * 0.01 + e.ph) * 3;
      ctx.fillStyle = flash ? '#fff' : d.a;
      ctx.beginPath(); ctx.moveTo(-4, -2); ctx.lineTo(-16 + wingFlap, -8); ctx.lineTo(-14 + wingFlap, 4); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(4, -2); ctx.lineTo(16 - wingFlap, -8); ctx.lineTo(14 - wingFlap, 4); ctx.lineTo(4, 6); ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(-3, -6, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -6, 2, 0, Math.PI * 2); ctx.fill();
    } else {
      // Bee - smaller, simpler
      ctx.fillStyle = flash ? '#fff' : d.c; ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 4;
      ctx.beginPath(); ctx.moveTo(0, -11); ctx.lineTo(-12, -1); ctx.lineTo(-10, 12); ctx.lineTo(-3, 7); ctx.lineTo(0, 13); ctx.lineTo(3, 7); ctx.lineTo(10, 12); ctx.lineTo(12, -1); ctx.closePath(); ctx.fill();
      ctx.fillStyle = flash ? '#fff' : d.a; ctx.beginPath(); ctx.arc(-6, 1, 3, 0, Math.PI * 2); ctx.arc(6, 1, 3, 0, Math.PI * 2); ctx.fill();
    }

    // Eyes (for non-butterfly)
    if (e.type !== 'butterfly') {
      ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(-e.w / 6, -1, 1.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.w / 6, -1, 1.7, 0, Math.PI * 2); ctx.fill();
    }

    // Champion star
    if (e.champion) { ctx.fillStyle = '#ff0'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.fillText('★', 0, -e.h / 2 - 4); }

    // Attack warning indicator
    if (e.dt > 0 && e.dt <= 30 && e.st === 'form') {
      if (Math.sin(Date.now() * 0.02) > 0) { ctx.fillStyle = '#f00'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText('!', 0, -e.h / 2 - 8); }
    }

    // Health bar for multi-hp enemies
    if (e.mhp > 1 && e.hp < e.mhp) {
      const bw = e.w; ctx.fillStyle = '#333'; ctx.fillRect(-bw / 2, e.h / 2 + 2, bw, 2); ctx.fillStyle = e.hp > e.mhp * 0.5 ? '#0f0' : '#f00'; ctx.fillRect(-bw / 2, e.h / 2 + 2, bw * (e.hp / e.mhp), 2);
    }

    // Escort count display for bosses
    if (e.type === 'boss' || e.type === 'boss2') {
      const escorts = enemies.filter(en => en.on && en.al && en.type === e.type && en !== e).length;
      if (escorts > 0) {
        ctx.fillStyle = '#ff8800'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
        ctx.fillText('+' + escorts, 0, e.h / 2 + 14);
      }
    }

    ctx.restore();
  }

  // === FORM PARTICLES ===
  for (const fp of formParticles) {
    ctx.globalAlpha = fp.life / 30; ctx.fillStyle = fp.c;
    ctx.beginPath(); ctx.arc(fp.x, fp.y, fp.sz * (fp.life / 25), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === ENEMY BULLETS ===
  for (const b of enemyBullets) {
    ctx.fillStyle = b.c; ctx.shadowColor = b.c; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 1, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // === POWERUPS ===
  for (const p of powerups) {
    ctx.save();
    const ps = 1 + Math.sin(Date.now() * 0.007) * 0.12;
    ctx.translate(p.x, p.y); ctx.scale(ps, ps);
    ctx.globalAlpha = p.life < 30 ? (Math.sin(Date.now() * 0.02) > 0 ? 1 : 0.3) : 1;
    ctx.fillStyle = '#fc0'; ctx.shadowColor = '#fc0'; ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.moveTo(-6, -4); ctx.lineTo(0, 5); ctx.lineTo(6, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // === SCORE POPUPS ===
  for (const p of scorePopups) {
    ctx.save(); ctx.fillStyle = p.c; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(p.life / 30, 1); ctx.shadowColor = p.c; ctx.shadowBlur = 3;
    ctx.fillText(p.text, p.x, p.y); ctx.restore();
  }

  // === PARTICLES ===
  for (const p of particles) {
    ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * (p.life / 20), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === WAVE TRANSITION ===
  if (state === STATE.WAVE_TRANS) {
    ctx.save(); ctx.fillStyle = '#fff'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#f80'; ctx.shadowBlur = 12; ctx.fillText('WAVE ' + wave, W / 2, H / 2 - 8);
    ctx.shadowBlur = 0; ctx.font = '14px monospace'; ctx.fillStyle = '#aaa';
    ctx.fillText('Get ready...', W / 2, H / 2 + 18); ctx.restore();
  }

  // === WAVE CLEAR CELEBRATION ===
  if (waveClearTimer > 0) {
    ctx.save(); const fadeIn = Math.min(1, (90 - waveClearTimer) / 15);
    ctx.globalAlpha = fadeIn; ctx.fillStyle = '#ff0'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0'; ctx.shadowBlur = 15; ctx.fillText(waveClearMsg, W / 2, H * 0.3);
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '13px monospace';
    ctx.globalAlpha = fadeIn * 0.7; ctx.fillText('Great job!', W / 2, H * 0.35); ctx.restore();
  }
}

function drawOver() {
  ctx.save();
  ctx.fillStyle = '#f00'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 18; ctx.fillText('GAME OVER', W / 2, H * 0.35);
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '19px monospace';
  ctx.fillText('SCORE: ' + score.toString().padStart(8, '0'), W / 2, H * 0.42);
  ctx.font = '15px monospace'; ctx.fillStyle = '#f80';
  ctx.fillText('WAVE ' + wave, W / 2, H * 0.48);
  ctx.fillStyle = '#aaa'; ctx.fillText('HIGH SCORE: ' + highScore.toString().padStart(8, '0'), W / 2, H * 0.54);

  if (score >= highScore && score > 0) {
    if (Math.sin(Date.now() * 0.006) > 0) {
      ctx.fillStyle = '#ff0'; ctx.font = 'bold 16px monospace'; ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
      ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.6); ctx.shadowBlur = 0;
    }
  }

  ctx.fillStyle = '#ff0'; ctx.font = '12px monospace';
  if (Math.sin(Date.now() * 0.004) > 0) ctx.fillText('TOUCH TO CONTINUE', W / 2, H * 0.66);
  ctx.restore();

  for (const p of particles) {
    ctx.globalAlpha = p.life / 25; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * (p.life / 20), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== LOOP =====
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
